server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing — renvoie toujours index.html pour les routes client
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressif pour les assets versionnés (hash dans le nom)
  location ~* \.(js|css|woff2?|svg|png|jpe?g|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Empêche la mise en cache du HTML (pour que les nouveaux assets soient pris)
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Sécurité basique
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin-when-cross-origin";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
  gzip_min_length 1024;
}
