name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  SERVICE_NAME: findmycar-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      cloud_run_url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/findmycar/backend:${{ github.sha }}
          docker build -f backend/Dockerfile.cloudrun -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy Cloud Run
        id: deploy
        run: |
          URL=$(gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi --cpu 1 --timeout 120 --concurrency 20 --max-instances 3 \
            --set-env-vars NODE_ENV=production,SCRAPER_MODE=live,SCRAPER_ENGINE=auto,FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},CORS_ORIGIN=https://${{ secrets.GCP_PROJECT_ID }}.web.app \
            --set-secrets SCHEDULER_SECRET=scheduler-secret:latest \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install & build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.cloud_run_url }}
        run: |
          npm ci
          npm run build

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
